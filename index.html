  <meta name="pld-api-base" content="http://127.0.0.1:3000">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/dashboard.css">

  <style>
    #pld-boot-error { position: fixed; top: 0; left: 0; right: 0; z-index: 99999; padding: 12px 16px; background: #b91c1c; color: #fff; font-size: 14px; text-align: center; }
    #pld-boot-error.hidden { display: none; }
  </style>
</head>
<body>
  <div id="pld-boot-error" class="pld-boot-error hidden" role="alert"></div>
  <!-- Command Palette (Cmd+K) -->
  <div id="commandPalette" class="command-palette hidden">
    <div class="command-palette-backdrop"></div>
    <div class="command-palette-dialog">
      <div class="command-palette-input-wrap">
        <svg class="command-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="commandInput" placeholder="Search events, crew, trucks, commands…" autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <div class="command-palette-results" id="commandResults"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- App Shell -->
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark" title="PM">
            <img id="pldShellLogo" class="logo-img" src="assets/branding/default-logo.png?v=4" alt="" width="80" height="80" decoding="async" onerror="this.onerror=null;this.src='assets/branding/default-logo.png?v=4';" />
          </div>
          <span class="logo-text">PM</span>
        </div>
      </div>

      <div class="sidebar-tenant">
        <div class="tenant-badge" onclick="openCompanyProfile()">
          <span class="tenant-avatar">—</span>
          <div class="tenant-info">
            <span class="tenant-name">…</span>
            <span class="tenant-role">—</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-label">Overview</span>
          <a href="javascript:void(0)" class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard'); return false;">

            <span>Dashboard</span>
          </a>
          <a href="javascript:void(0)" class="nav-item" data-page="tasks" onclick="navigateTo('tasks'); return false;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            <span>Tasks</span>
          </a>
        </div>
        <div class="nav-section">
          <span class="nav-section-label">Production</span>
          <a href="javascript:void(0)" class="nav-item" data-page="events" onclick="navigateTo('events'); return false;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span>Events</span>
            <span class="nav-badge" id="navBadgeEvents" hidden aria-live="polite"></span>
          </a>
          <a href="javascript:void(0)" class="nav-item" data-page="scheduling" onclick="navigateTo('scheduling'); return false;">

            <span>Scheduling</span>
          </a>
          <a href="javascript:void(0)" class="nav-item" data-page="personnel" onclick="navigateTo('personnel'); return false;">

            <span class="nav-badge" id="navBadgePersonnel" hidden aria-live="polite"></span>
          </a>
          <a href="javascript:void(0)" class="nav-item" data-page="trucks" onclick="navigateTo('trucks'); return false;">

            <span>Trucks</span>
          </a>
        </div>
        <div class="nav-section">
          <span class="nav-section-label">Operations</span>
          <a href="javascript:void(0)" class="nav-item" data-page="clients" onclick="navigateTo('clients'); return false;">

            <span>Clients</span>
          </a>
          <a href="javascript:void(0)" class="nav-item" data-page="venues" onclick="navigateTo('venues'); return false;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>Venues</span>
          </a>
          <a href="javascript:void(0)" class="nav-item" data-page="vendors" onclick="navigateTo('vendors'); return false;">

            <span>Vendors</span>
          </a>

            <span>Contacts</span>
          </a>
          <a href="javascript:void(0)" class="nav-item" data-page="travel" onclick="navigateTo('travel'); return false;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.4-.1.9.3 1.1l5.2 3 L6 14l-2.5-.5c-.3-.1-.7.1-.8.4l-.2.4c-.2.4 0 .8.3 1l3.3 2.1 2.1 3.3c.2.3.6.5 1 .3l.4-.2c.3-.2.5-.5.4-.8L9.5 18l2.9-2.9 3 5.2c.2.4.7.5 1.1.3l.5-.3c.4-.2.6-.6.5-1.1z"/></svg>
            <span>Travel</span>
          </a>
          <a href="javascript:void(0)" class="nav-item" data-page="financial" onclick="navigateTo('financial'); return false;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>

      <div class="sidebar-footer">
        <div class="presence-indicator" title="Active connections in this tenant (PostgreSQL API WebSocket)">
          <div class="presence-dot pending" aria-hidden="true"></div>
          <span id="pldPresenceLabel">Connecting…</span>
        </div>
        <button class="sidebar-collapse-btn" id="sidebarToggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11,17 6,12 11,7"/><polyline points="18,17 13,12 18,7"/></svg>
        </button>
      </div>

    <!-- Main Content -->
    <main class="main">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-menu-btn" id="menuToggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item">Dashboard</span>
          </div>
        </div>
        <div class="topbar-center">
          <button class="search-trigger" id="searchTrigger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <span>Search…</span>
            <kbd>Ctrl+K</kbd>
          </button>
        </div>
        <div class="topbar-right">
          <div id="pldApiStatusBar" class="pld-api-status-bar" style="display:none;" aria-live="polite"></div>
          <button type="button" id="pldPlatformAdminTopBtn" class="btn btn-ghost btn-sm pld-platform-admin-top" style="display:none;flex-shrink:0;" title="Master admin — tenants and users (platform)" onclick="navigateTo('platform-admin');" aria-label="Open master admin">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="vertical-align:middle;margin-right:4px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span style="font-size:12px;font-weight:500;">Admin</span>
          </button>
          <button type="button" id="pldDevSeedBtn" class="btn btn-ghost btn-sm" style="display:none;flex-shrink:0;color:var(--accent-cyan);" title="Dev: insert full idempotent demo catalog via API (see scripts/seed-demo-catalog.mjs)" onclick="void window.pldQuickSeedDemo();" aria-label="Seed demo data">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="vertical-align:middle;margin-right:4px;"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
            <span style="font-size:12px;font-weight:500;">Seed demo</span>
          </button>
          <button class="topbar-icon-btn" id="notificationBtn" type="button" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-dot" id="notificationUnreadDot" hidden aria-hidden="true"></span>
          </button>
          <div class="topbar-avatar">
            <span>—</span>
          </div>
        </div>
      </header>

      <!-- Page Content Area -->
      <div class="page-content" id="pageContent">
        <!-- Pages rendered here by JS -->
      </div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay hidden" id="modalOverlay">

      <div class="modal-header" id="modalHeader">

      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
