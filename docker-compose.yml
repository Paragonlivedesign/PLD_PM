services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pld
      POSTGRES_PASSWORD: pld
      POSTGRES_DB: pld_dev
    volumes:
      - pld_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pld_pg:
