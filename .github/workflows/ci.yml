name: CI

# Two jobs run in parallel (`build` vs `test-backend`). The workflow fails if either
# job fails — suitable for fast feedback; not a single linear "fail-fast" stage graph.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run typecheck

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pld
          POSTGRES_PASSWORD: pld
          POSTGRES_DB: pld_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pld -d pld_dev"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 8
    env:
      DATABASE_URL: postgresql://pld:pld@127.0.0.1:5432/pld_dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run db:migrate
      # Full Vitest includes checkpoint1.api.integration + checkpoint2.* suites (see npm run test:cp1 / test:cp2).
      - run: npm run test
